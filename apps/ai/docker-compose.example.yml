services:
  enterprise-ai:
    build: .
    container_name: vafox-auth
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:5010:5010"
    volumes:
      - /opt/ai-vafox/operation-exports:/data/operation_exports
    networks:
      - vafox-platform
  replenishment-worker:
    build: .
    container_name: foxbrain-replenishment-worker
    restart: always
    healthcheck:
      disable: true
    env_file:
      - .env
    command: ["python", "replenishment_worker.py"]
    depends_on:
      - enterprise-ai
    networks:
      - vafox-platform

networks:
  vafox-platform:
    external: true
    name: ai-vafox_default
