<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 | FireFox 企业身份中心</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='identity.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-copy">
      <span class="mark">F</span><h1>真实身份，真实工作</h1>
      <p>每位员工使用自己的身份进入平台。系统会根据岗位和负责门店提供相应数据与 AI 能力。</p>
    </section>
    <form class="login-form" data-login-form>
      <h2>登录 FireFox</h2>
      <label>姓名、员工编号或手机号<input name="username" autocomplete="username" required></label>
      <label>密码<input type="password" name="password" autocomplete="current-password" required></label>
      <p class="form-message" data-form-message aria-live="polite"></p>
      <button type="submit">登录</button>
      {% if wecom_enabled %}<a class="wecom-login" href="/auth/wecom/start">使用企业微信登录</a>{% endif %}
    </form>
  </main>
</body>
</html>
