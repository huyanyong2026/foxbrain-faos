<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#15382c">
  <title>{% block title %}FoxBrain 企业 AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='replenishment.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard"><span>F</span><strong>FoxBrain 企业 AI</strong></a>
    <div class="user"><span>{{ user.display_name if user else '' }}</span><button class="icon-button" data-logout title="退出登录" aria-label="退出登录">↪</button></div>
  </header>
  <nav class="nav" aria-label="主要导航">
    <a href="/dashboard">AI工作台</a>
    {% if user and user.role in ['admin','manager','boss','purchaser','store_manager'] %}<a href="/replenishment">AI补货中心</a>{% endif %}
    <a href="/agents">Agent中心</a>
    <a href="/wecom">企业微信</a>
    <a href="/knowledge">知识中心</a>
    <a href="/tasks">任务中心</a>
    <a href="/feedback">反馈学习</a>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <input type="hidden" id="csrf-token" value="{{ csrf_token() }}">
</body>
</html>
