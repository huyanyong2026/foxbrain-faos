<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#15382c">
  <title>{% block title %}FireFox 企业 AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='identity.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard"><span>F</span><strong>FireFox 企业 AI</strong></a>
    <div class="user"><span>{{ user.real_name or user.display_name if user else '' }}</span><button class="icon-button" data-logout title="退出登录" aria-label="退出登录">退出</button></div>
  </header>
  <nav class="nav" aria-label="主要导航">
    <a href="/dashboard">AI工作台</a>
    <a href="/agents">AI助手</a>
    <a href="/knowledge">知识中心</a>
    <a href="/tasks">任务中心</a>
    <a href="/feedback">反馈学习</a>
    {% if user and ('*' in user.identity.permissions or 'identity.view' in user.identity.permissions) %}<a href="/identity">身份与权限</a>{% endif %}
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <input type="hidden" id="csrf-token" value="{{ csrf_token() }}">
</body>
</html>
