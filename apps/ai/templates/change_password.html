{% extends "base.html" %}
{% block title %}更新密码 | VAFOX{% endblock %}
{% block content %}
<section class="page-title"><p class="eyebrow">账号安全</p><h1>设置个人密码</h1><p>临时密码只能用于首次登录。新密码至少12位，并包含大写字母、小写字母和数字。</p></section>
<form class="panel narrow" method="post" action="/ops-api/change-password">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>当前密码<input type="password" name="current_password" autocomplete="current-password" required></label>
  <label>新密码<input type="password" name="new_password" autocomplete="new-password" minlength="12" required></label>
  <label>再次输入新密码<input type="password" name="confirm_password" autocomplete="new-password" minlength="12" required></label>
  <button type="submit">更新密码并重新登录</button>
</form>
{% endblock %}
