# Production host Nginx template for FoxBrain FAOS.
# Scope: huyan.vafox.com only. Do not merge this server block with
# dify.huyan.vafox.com or n8n.huyan.vafox.com.
#
# The Docker Compose foxbrain-nginx service listens on host loopback only:
#   127.0.0.1:${FOXBRAIN_NGINX_HOST_PORT:-8088} -> foxbrain-nginx:80
# foxbrain-nginx then proxies inside Docker to foxbrain-web and foxbrain-api.

upstream foxbrain_faos_local {
    server 127.0.0.1:8088;
    keepalive 32;
}

server {
    listen 80;
    server_name huyan.vafox.com;

    # Keep this ACME location if certificates are issued by the host Nginx.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://foxbrain_faos_local;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}

