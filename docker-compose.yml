name: vafox-foundation

x-service: &service
  build:
    context: .
    dockerfile: services/Dockerfile
  env_file: .env
  restart: unless-stopped
  networks: [vafox]
  logging:
    driver: json-file
    options: {max-size: "10m", max-file: "3"}

services:
  gateway:
    <<: *service
    build:
      context: .
      dockerfile: services/Dockerfile
      args: {SERVICE_MODULE: gateway}
    ports: ["${GATEWAY_PORT:-8080}:8080"]
    depends_on:
      auth: {condition: service_healthy}
      core-data: {condition: service_healthy}
      ai: {condition: service_healthy}
      memory: {condition: service_healthy}

  auth:
    <<: *service
    build: {context: ., dockerfile: services/Dockerfile, args: {SERVICE_MODULE: auth}}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  core-data:
    <<: *service
    build: {context: ., dockerfile: services/Dockerfile, args: {SERVICE_MODULE: core_data}}
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}

  ai:
    <<: *service
    build: {context: ., dockerfile: services/Dockerfile, args: {SERVICE_MODULE: ai}}
    depends_on:
      redis: {condition: service_healthy}

  memory:
    <<: *service
    build: {context: ., dockerfile: services/Dockerfile, args: {SERVICE_MODULE: memory}}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data, ./infrastructure/postgres:/docker-entrypoint-initdb.d:ro]
    networks: [vafox]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis_data:/data]
    networks: [vafox]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio_data:/data]
    networks: [vafox]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  vafox: {driver: bridge}
volumes:
  postgres_data:
  redis_data:
  minio_data:
