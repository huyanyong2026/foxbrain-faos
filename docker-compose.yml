name: vafox-memory-factory

x-service: &service
  build:
    context: .
    dockerfile: services/Dockerfile
  env_file: .env
  restart: unless-stopped
  networks: [vafox]
  logging:
    driver: json-file
    options: {max-size: "10m", max-file: "3"}

services:
  memory-api:
    <<: *service
    build:
      context: .
      dockerfile: services/Dockerfile
      args: {SERVICE_MODULE: memory}
    ports: ["${MEMORY_API_PORT:-8080}:8080"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}

  embedding-api:
    <<: *service
    build:
      context: .
      dockerfile: services/Dockerfile
      args: {SERVICE_MODULE: embedding}
    ports: ["${EMBEDDING_API_PORT:-8083}:8080"]

  knowledge-api:
    <<: *service
    build:
      context: .
      dockerfile: services/Dockerfile
      args: {SERVICE_MODULE: knowledge}
    ports: ["${KNOWLEDGE_API_PORT:-8084}:8080"]
    depends_on:
      memory-api: {condition: service_started}

  # Pilot entry point. The gateway verifies bearer tokens before forwarding
  # Customer Brain, Retail Brain, and Store Manager requests to business-api.
  gateway:
    <<: *service
    build:
      context: .
      dockerfile: services/Dockerfile
      args: {SERVICE_MODULE: gateway}
    ports: ["${GATEWAY_PORT:-8088}:8080"]
    depends_on:
      business-api: {condition: service_started}

  business-api:
    <<: *service
    build:
      context: .
      dockerfile: services/Dockerfile
      args: {SERVICE_MODULE: business}

  ai-web:
    build: {context: ., dockerfile: infrastructure/docker/frontend.Dockerfile, args: {APP: ai-web}}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8088}
    ports: ["${AI_WEB_PORT:-3000}:3000"]
    networks: [vafox]
    depends_on:
      gateway: {condition: service_started}

  huyan-web:
    build: {context: ., dockerfile: infrastructure/docker/frontend.Dockerfile, args: {APP: huyan-web}}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8088}
    ports: ["${HUYAN_WEB_PORT:-3001}:3000"]
    networks: [vafox]
    depends_on:
      gateway: {condition: service_started}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data, ./infrastructure/postgres:/docker-entrypoint-initdb.d:ro]
    networks: [vafox]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis_data:/data]
    networks: [vafox]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio_data:/data]
    networks: [vafox]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  vafox: {driver: bridge}
volumes:
  postgres_data:
  redis_data:
  minio_data:
