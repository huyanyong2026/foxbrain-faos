name: Enterprise OS Release Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: enterprise-os-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Enterprise OS alignment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Run Enterprise OS alignment tests
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_platform_alignment.py \
            tests/test_security_boundaries.py \
            tests/test_core_readonly_api.py

      - name: Guard GitHub workflow shell scripts
        run: |
          set -euo pipefail
          python .github/scripts/check_workflow_scripts.py

  auto-merge:
    name: Enable auto-merge after successful gates
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable pull request auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_URL" --auto --squash
