name: Deploy AI Replenishment Center

permissions:
  contents: read

concurrency:
  group: foxbrain-ai-core-production
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - "apps/ai/**"
      - "apps/core_api/**"
      - "deploy/nginx/ai.vafox.com-enterprise-ai.conf.example"
      - ".github/workflows/deploy-ai-replenishment.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow deployment scripts
        run: python3 .github/scripts/check_workflow_scripts.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install AI dependencies
        run: pip install -r apps/ai/requirements.txt
      - name: Compile and test
        run: |
          python -m compileall -q apps/ai apps/core_api
          python -m unittest \
            tests.test_ai_enterprise_platform \
            tests.test_ai_replenishment \
            tests.test_core_readonly_api \
            tests.test_enterprise_data_integration \
            tests.test_replenishment_worker
      - name: Build AI image
        run: docker build -t foxbrain-enterprise-ai:${{ github.sha }} apps/ai

  deploy-core-api:
    needs: test
    runs-on: ubuntu-latest
    env:
      CORE_SERVER_HOST: ${{ secrets.CORE_SERVER_HOST }}
      CORE_SERVER_USER: ${{ secrets.CORE_SERVER_USER }}
      CORE_SERVER_SSH_KEY: ${{ secrets.CORE_SERVER_SSH_KEY }}
      CORE_STORE_MAP_JSON: ${{ secrets.CORE_STORE_MAP_JSON }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow deployment scripts
        run: python3 .github/scripts/check_workflow_scripts.py
      - name: Require Core deployment secrets
        run: |
          missing=0
          for name in CORE_SERVER_HOST CORE_SERVER_USER CORE_SERVER_SSH_KEY CORE_STORE_MAP_JSON; do
            if [ -z "${!name}" ]; then echo "Missing required GitHub Secret: $name"; missing=1; fi
          done
          exit "$missing"
      - name: Upload Core API release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CORE_SERVER_HOST }}
          username: ${{ secrets.CORE_SERVER_USER }}
          key: ${{ secrets.CORE_SERVER_SSH_KEY }}
          port: ${{ secrets.CORE_SERVER_PORT || 22 }}
          source: "apps/core_api/app.py,apps/core_api/__init__.py"
          target: "/tmp/foxbrain-core-${{ github.sha }}"
      - name: Deploy read-only Core endpoint
        uses: appleboy/ssh-action@v1.0.3
        env:
          CORE_STORE_MAP_JSON: ${{ secrets.CORE_STORE_MAP_JSON }}
        with:
          host: ${{ secrets.CORE_SERVER_HOST }}
          username: ${{ secrets.CORE_SERVER_USER }}
          key: ${{ secrets.CORE_SERVER_SSH_KEY }}
          port: ${{ secrets.CORE_SERVER_PORT || 22 }}
          envs: CORE_STORE_MAP_JSON
          command_timeout: 10m
          script: |
            set -eu
            API_DIR=/opt/foxbrain-core/api
            STAGE_DIR=/tmp/foxbrain-core-${{ github.sha }}/apps/core_api
            BACKUP_DIR=/opt/foxbrain-core/backups/actions-$(date +%Y%m%d%H%M%S)
            test -f "$STAGE_DIR/app.py"
            test -f "$STAGE_DIR/__init__.py"
            sudo install -d -m 0750 "$API_DIR" "$BACKUP_DIR"
            test -f "$API_DIR/core-api.env"
            if [ -f "$API_DIR/app.py" ]; then sudo cp -a "$API_DIR/app.py" "$BACKUP_DIR/app.py"; fi
            sudo cp -a "$API_DIR/core-api.env" "$BACKUP_DIR/core-api.env"
            sudo install -m 0644 "$STAGE_DIR/app.py" "$API_DIR/app.py"
            sudo install -m 0644 "$STAGE_DIR/__init__.py" "$API_DIR/__init__.py"
            sudo env CORE_STORE_MAP_JSON="$CORE_STORE_MAP_JSON" python3 - <<'PY'
            import os
            from pathlib import Path
            path = Path('/opt/foxbrain-core/api/core-api.env')
            lines = path.read_text().splitlines()
            values = {'CORE_STORE_MAP_JSON': os.environ['CORE_STORE_MAP_JSON'], 'CORE_TIMEZONE': 'Asia/Shanghai'}
            kept = [line for line in lines if line.split('=', 1)[0] not in values]
            path.write_text('\n'.join(kept + [f'{key}={value}' for key, value in values.items()]) + '\n')
            PY
            sudo systemctl restart foxbrain-core-api.service
            healthy=0
            for attempt in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8090/healthz; then healthy=1; break; fi
              sleep 2
            done
            if [ "$healthy" -ne 1 ]; then
              if [ -f "$BACKUP_DIR/app.py" ]; then sudo cp -a "$BACKUP_DIR/app.py" "$API_DIR/app.py"; fi
              sudo cp -a "$BACKUP_DIR/core-api.env" "$API_DIR/core-api.env"
              sudo systemctl restart foxbrain-core-api.service
              exit 1
            fi
            rm -rf "/tmp/foxbrain-core-${{ github.sha }}"

  deploy-ai:
    needs: [test, deploy-core-api]
    runs-on: ubuntu-latest
    env:
      AI_SERVER_HOST: ${{ secrets.AI_SERVER_HOST }}
      AI_SERVER_USER: ${{ secrets.AI_SERVER_USER }}
      AI_SERVER_SSH_KEY: ${{ secrets.AI_SERVER_SSH_KEY }}
      CORE_API_TOKEN: ${{ secrets.CORE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow deployment scripts
        run: python3 .github/scripts/check_workflow_scripts.py
      - name: Require AI deployment secrets
        run: |
          missing=0
          for name in AI_SERVER_HOST AI_SERVER_USER AI_SERVER_SSH_KEY CORE_API_TOKEN; do
            if [ -z "${!name}" ]; then echo "Missing required GitHub Secret: $name"; missing=1; fi
          done
          exit "$missing"
      - name: Upload AI release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AI_SERVER_HOST }}
          username: ${{ secrets.AI_SERVER_USER }}
          key: ${{ secrets.AI_SERVER_SSH_KEY }}
          port: ${{ secrets.AI_SERVER_PORT || 22 }}
          source: "apps/ai/**"
          target: "/tmp/foxbrain-ai-${{ github.sha }}"
      - name: Deploy ai.vafox.com
        uses: appleboy/ssh-action@v1.0.3
        env:
          CORE_API_TOKEN: ${{ secrets.CORE_API_TOKEN }}
        with:
          host: ${{ secrets.AI_SERVER_HOST }}
          username: ${{ secrets.AI_SERVER_USER }}
          key: ${{ secrets.AI_SERVER_SSH_KEY }}
          port: ${{ secrets.AI_SERVER_PORT || 22 }}
          envs: CORE_API_TOKEN
          command_timeout: 20m
          script: |
            set -eu
            RELEASE_DIR=/opt/ai-vafox/releases/${{ github.sha }}/apps/ai
            STAGE_DIR=/tmp/foxbrain-ai-${{ github.sha }}/apps/ai
            SHARED_ENV=/opt/ai-vafox/.env
            test -f "$STAGE_DIR/docker-compose.example.yml"
            test -f "$SHARED_ENV"
            sudo install -d -m 0755 "$RELEASE_DIR"
            sudo cp -a "$STAGE_DIR/." "$RELEASE_DIR/"
            sudo env CORE_API_TOKEN="$CORE_API_TOKEN" python3 - <<'PY'
            import os
            from pathlib import Path
            path = Path('/opt/ai-vafox/.env')
            lines = path.read_text().splitlines()
            values = {
                'CORE_BASE_URL': 'https://core.vafox.com',
                'CORE_API_TOKEN': os.environ['CORE_API_TOKEN'],
                'REPLENISHMENT_TIMEZONE': 'Asia/Shanghai',
                'REPLENISHMENT_RUN_TIME': '22:30',
                'AI_INTERNAL_REPLENISHMENT_URL': 'http://enterprise-ai:5010/ops-api/internal/replenishment/run',
                'OPERATION_EXPORT_ROOT': '/data/operation_exports',
            }
            kept = [line for line in lines if line.split('=', 1)[0] not in values]
            path.write_text('\n'.join(kept + [f'{key}={value}' for key, value in values.items()]) + '\n')
            PY
            sudo ln -sfn "$SHARED_ENV" "$RELEASE_DIR/.env"
            cd "$RELEASE_DIR"
            sudo docker compose -f docker-compose.example.yml build
            sudo docker compose -f docker-compose.example.yml up -d
            healthy=0
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:5010/ops-api/health; then healthy=1; break; fi
              sleep 2
            done
            test "$healthy" -eq 1
            sudo ln -sfn "$RELEASE_DIR" /opt/ai-vafox/current-enterprise-ai
            sudo docker compose -f docker-compose.example.yml ps
            rm -rf "/tmp/foxbrain-ai-${{ github.sha }}"
