name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and repository tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Node dependencies
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Run repository tests
        run: npm run test:repository

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            VAFOX-Control/pyproject.toml
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pip install -e 'VAFOX-Control[dev]'
      - name: Run pytest
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Node dependencies
        run: npm install --no-audit --no-fund
      - name: Build frontends
        run: npm run build

  compose-and-workflow-guard:
    name: Docker Compose and workflow guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config --quiet
      - name: Guard workflow shell scripts
        run: python3 .github/scripts/check_workflow_scripts.py
