name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and repository tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Run repository tests
        run: npm run test:repository

  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            VAFOX-Control/pyproject.toml
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pip install -e 'VAFOX-Control[dev]'
      - name: Run pytest
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund
      - name: Build frontends
        run: npm run build

  docker:
    name: Docker Compose and image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Docker Compose configuration
        run: |
          cp .env.example .env
          trap 'rm -f .env' EXIT
          docker compose config --quiet
      - name: Build frontend Docker images
        run: |
          docker build --build-arg APP=ai-web -f infrastructure/docker/frontend.Dockerfile .
          docker build --build-arg APP=huyan-web -f infrastructure/docker/frontend.Dockerfile .
