name: FoxBrain Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow deployment scripts
        run: python3 .github/scripts/check_workflow_scripts.py

      - name: Prepare compose env
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose config

      - name: Deploy to Tencent Cloud
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            if [ ! -d /opt/foxbrain/.git ]; then
              sudo mkdir -p /opt/foxbrain
              sudo git clone https://github.com/${{ github.repository }}.git /opt/foxbrain
            fi
            cd /opt/foxbrain
            if [ ! -f .env ]; then sudo cp .env.example .env; fi
            sudo bash deploy.sh

      - name: Report skipped legacy deployment
        if: ${{ env.SERVER_HOST == '' || env.SERVER_USER == '' || env.SERVER_SSH_KEY == '' }}
        run: echo "Legacy huyan.vafox.com deployment skipped because SERVER_* secrets are not configured."
