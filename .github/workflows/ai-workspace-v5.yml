name: AI Workspace V5 Protection

on:
  push:
  pull_request:

jobs:
  verify-ai-workspace-v5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify AI Workspace V5 deployment protection
        run: python scripts/verify_ai_workspace_v5.py
      - name: Run AI Workspace V5 tests
        run: python -m pytest tests/test_ai_workspace_v5_migration.py tests/test_ai_os_v5.py
