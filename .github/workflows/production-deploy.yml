name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy VAFOX production runtime
    runs-on: ubuntu-latest
    environment: production
    env:
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST || secrets.SERVER_HOST }}
      PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER || secrets.SERVER_USER }}
      PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH || '/opt/foxbrain' }}
      PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || secrets.SERVER_PORT || '22' }}
      FOXBRAIN_VERSION: AI-OS-V6-CLEAN-REBUILD-V1
      GIT_COMMIT: ${{ github.sha }}
      BUILD_TIME: ${{ github.run_started_at }}
      DEPLOY_TIME: ${{ github.run_started_at }}

    steps:
      - name: Verify production deployment secrets
        run: |
          set -euo pipefail
          missing=0
          for name in PRODUCTION_SSH_HOST PRODUCTION_SSH_USER PRODUCTION_DEPLOY_PATH PRODUCTION_SSH_PORT; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing production deployment value::Required production deployment value ${name} is not configured. Configure the PRODUCTION_* secret, or keep the supported legacy SERVER_* secret fallback."
              missing=1
            fi
          done
          if [ -z "${{ secrets.PRODUCTION_SSH_KEY || secrets.SERVER_SSH_KEY }}" ]; then
            echo "::error title=Missing production deployment value::Required production SSH private key is not configured. Configure PRODUCTION_SSH_KEY, or keep the supported legacy SERVER_SSH_KEY fallback."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Production deployment cannot continue until the SSH host, user, key, port, and deploy path resolve from PRODUCTION_* secrets or legacy SERVER_* fallbacks."
            exit 1
          fi
          case "$PRODUCTION_DEPLOY_PATH" in
            /*) ;;
            *)
              echo "::error title=Invalid production deploy path::PRODUCTION_DEPLOY_PATH must resolve to an absolute path. Current value is '${PRODUCTION_DEPLOY_PATH}'."
              exit 1
              ;;
          esac
          case "$PRODUCTION_SSH_PORT" in
            ''|*[!0-9]*)
              echo "::error title=Invalid production SSH port::PRODUCTION_SSH_PORT must resolve to a numeric TCP port. Current value is '${PRODUCTION_SSH_PORT}'."
              exit 1
              ;;
          esac
          echo "Production deployment target resolved: ${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}:${PRODUCTION_SSH_PORT}${PRODUCTION_DEPLOY_PATH}."

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_SSH_KEY || secrets.SERVER_SSH_KEY }}" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keyscan -p "$PRODUCTION_SSH_PORT" -H "$PRODUCTION_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on production server
        id: deploy
        run: |
          set -euo pipefail
          quoted_deploy_path="$(printf '%q' "$PRODUCTION_DEPLOY_PATH")"
          ssh -i ~/.ssh/production_deploy_key \
            -p "$PRODUCTION_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}" \
            "PRODUCTION_DEPLOY_PATH=${quoted_deploy_path} GIT_COMMIT='${GIT_COMMIT}' BUILD_TIME='${BUILD_TIME}' DEPLOY_TIME='${DEPLOY_TIME}' FOXBRAIN_VERSION='${FOXBRAIN_VERSION}' bash -s" <<'REMOTE_DEPLOY'
          set -euo pipefail

          cd "$PRODUCTION_DEPLOY_PATH"
          previous_commit="$(git rev-parse HEAD || true)"
          rollback_file="/tmp/foxbrain-production-rollback-${GIT_COMMIT}.sh"
          printf '%s\n' "#!/usr/bin/env bash" "set -euo pipefail" "cd '$PRODUCTION_DEPLOY_PATH'" "git checkout '$previous_commit'" "docker compose up -d --build --remove-orphans" > "$rollback_file"
          chmod 700 "$rollback_file"
          export GIT_COMMIT BUILD_TIME DEPLOY_TIME FOXBRAIN_VERSION
          export FOXBRAIN_ENV=production FOXBRAIN_SYSTEM=VAFOX

          rollback() {
            echo "Deployment failed; rolling back to ${previous_commit}."
            if [ -n "$previous_commit" ]; then
              git checkout "$previous_commit"
              docker compose up -d --build --remove-orphans
            fi
          }
          trap rollback ERR

          if [ ! -f .env ]; then
            echo "Production server is missing $PRODUCTION_DEPLOY_PATH/.env. Create it on the server from .env.production or .env.example and populate real production values; do not commit .env."
            exit 1
          fi
          git fetch origin main
          git checkout main
          git reset --hard "$GIT_COMMIT"
          python .github/scripts/validate_production_env.py .env
          python scripts/generate_deployment_metadata.py
          echo "Validating Docker Compose on production server with the server-managed .env file."
          docker compose config >/dev/null
          docker compose build --pull foxbrain-web foxbrain-api foxbrain-worker
          docker compose up -d --remove-orphans

          required_services="foxbrain-web foxbrain-api foxbrain-worker postgres redis minio qdrant nginx"
          max_attempts=24
          sleep_seconds=10
          all_healthy=false
          for attempt in $(seq 1 "$max_attempts"); do
            all_healthy=true
            for service in $required_services; do
              container_id="$(docker compose ps -q "$service")"
              if [ -z "$container_id" ]; then all_healthy=false; continue; fi
              health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
              echo "$service status: $health_status"
              if [ "$health_status" != "healthy" ]; then all_healthy=false; fi
            done
            if [ "$all_healthy" = true ]; then break; fi
            sleep "$sleep_seconds"
          done
          if [ "$all_healthy" != true ]; then docker compose ps; exit 1; fi

          docker container prune -f --filter "label!=com.docker.compose.project=foxbrain" || true
          docker image prune -f || true
          curl -fsS http://127.0.0.1:8088/health/runtime >/tmp/vafox-runtime.json
          python scripts/verify_release_runtime.py --expected-commit "$GIT_COMMIT" --expected-version "$FOXBRAIN_VERSION"
          trap - ERR
          rm -f "$rollback_file"
          echo "Deployment completed for $GIT_COMMIT."
          REMOTE_DEPLOY

      - name: Verify public production runtime
        run: |
          set -euo pipefail
          python scripts/verify_release_runtime.py --expected-commit "$GIT_COMMIT" --expected-version "$FOXBRAIN_VERSION"

      - name: Report production deployment failure
        if: failure()
        run: |
          set -euo pipefail
          {
            echo "## Production deployment failed"
            echo ""
            echo "- Commit: ${GIT_COMMIT}"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Rollback: the remote deploy trap automatically restores the previous checked-out release when the deploy step fails before completion."
          } >> "$GITHUB_STEP_SUMMARY"
