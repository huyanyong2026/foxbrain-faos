name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy VAFOX production runtime
    runs-on: ubuntu-latest
    environment: production
    env:
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
      PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      FOXBRAIN_VERSION: AI-OS-V6-CLEAN-REBUILD-V1
      GIT_COMMIT: ${{ github.sha }}
      BUILD_TIME: ${{ github.run_started_at }}
      DEPLOY_TIME: ${{ github.run_started_at }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate workflow deployment scripts
        run: python3 .github/scripts/check_workflow_scripts.py

      - name: Generate deployment metadata
        run: python scripts/generate_deployment_metadata.py
        env:
          FOXBRAIN_ENV: production

      - name: Validate Docker Compose
        run: docker compose config

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          missing=0
          for name in PRODUCTION_SSH_HOST PRODUCTION_SSH_USER PRODUCTION_DEPLOY_PATH; do
            if [ -z "${!name}" ]; then echo "Missing required GitHub Secret: $name"; missing=1; fi
          done
          if [ -z "${{ secrets.PRODUCTION_SSH_KEY }}" ]; then echo "Missing required GitHub Secret: PRODUCTION_SSH_KEY"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          printf '%s\n' "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keyscan -H "$PRODUCTION_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on production server
        run: |
          set -euo pipefail
          quoted_deploy_path="$(printf '%q' "$PRODUCTION_DEPLOY_PATH")"
          ssh -i ~/.ssh/production_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}" \
            "PRODUCTION_DEPLOY_PATH=${quoted_deploy_path} GIT_COMMIT='${GIT_COMMIT}' BUILD_TIME='${BUILD_TIME}' DEPLOY_TIME='${DEPLOY_TIME}' FOXBRAIN_VERSION='${FOXBRAIN_VERSION}' bash -s" <<'REMOTE_DEPLOY'
          set -euo pipefail

          cd "$PRODUCTION_DEPLOY_PATH"
          previous_commit="$(git rev-parse HEAD || true)"
          export GIT_COMMIT BUILD_TIME DEPLOY_TIME FOXBRAIN_VERSION
          export FOXBRAIN_ENV=production FOXBRAIN_SYSTEM=VAFOX

          rollback() {
            echo "Deployment failed; rolling back to ${previous_commit}."
            if [ -n "$previous_commit" ]; then
              git checkout "$previous_commit"
              docker compose up -d --build --remove-orphans
            fi
          }
          trap rollback ERR

          test -f .env
          git fetch origin main
          git checkout main
          git reset --hard "$GIT_COMMIT"
          python scripts/generate_deployment_metadata.py
          docker compose config >/dev/null
          docker compose build --pull foxbrain-web foxbrain-api foxbrain-worker
          docker compose up -d --remove-orphans

          required_services="foxbrain-web foxbrain-api foxbrain-worker postgres redis minio qdrant nginx"
          max_attempts=24
          sleep_seconds=10
          all_healthy=false
          for attempt in $(seq 1 "$max_attempts"); do
            all_healthy=true
            for service in $required_services; do
              container_id="$(docker compose ps -q "$service")"
              if [ -z "$container_id" ]; then all_healthy=false; continue; fi
              health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
              echo "$service status: $health_status"
              if [ "$health_status" != "healthy" ]; then all_healthy=false; fi
            done
            if [ "$all_healthy" = true ]; then break; fi
            sleep "$sleep_seconds"
          done
          if [ "$all_healthy" != true ]; then docker compose ps; exit 1; fi

          docker container prune -f --filter "label!=com.docker.compose.project=foxbrain" || true
          docker image prune -f || true
          curl -fsS http://127.0.0.1:8088/health/runtime >/tmp/vafox-runtime.json
          python scripts/verify_release_runtime.py --expected-commit "$GIT_COMMIT" --expected-version "$FOXBRAIN_VERSION"
          trap - ERR
          echo "Deployment completed for $GIT_COMMIT."
          REMOTE_DEPLOY
